<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartCupom</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
    <h1>💰 SmartCupom</h1>
    <button id="btnTema">🌙</button>
</header>


<nav>

<button data-page="dashboard">🏠 Dashboard</button>

<button data-page="produtos">📦 Produtos</button>

<button data-page="cupons">🎟 Cupons</button>

<button data-page="listas">🛒 Listas</button>

<button data-page="simulacao">📊 Simular</button>

</nav>



<main>


<section id="dashboard" class="pagina">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Produtos</h3>
<span id="totalProdutos">0</span>
</div>


<div class="card">
<h3>Cupons</h3>
<span id="totalCupons">0</span>
</div>


<div class="card">
<h3>Economia</h3>
<span>R$ 0,00</span>
</div>


</div>

</section>



<section id="produtos" class="pagina oculto">

<h2>📦 Produtos</h2>


<div class="formulario">

<input id="nomeProduto" placeholder="Nome do produto">

<input 
id="precoProduto" 
type="number" 
step="0.01" 
placeholder="Preço">


<input 
id="quantidadeProduto" 
type="number" 
placeholder="Quantidade"
value="1">


<input 
id="categoriaProduto" 
placeholder="Categoria">


<button id="btnAdicionarProduto">
➕ Adicionar Produto
</button>


</div>


<hr>


<h3>Produtos cadastrados</h3>


<div id="listaProdutos">

</div>


</section>



<section id="cupons" class="pagina oculto">

<h2>🎟 Cupons</h2>


<div class="formulario">

<input 
id="nomeCupom" 
placeholder="Nome do cupom">


<input 
id="percentualCupom" 
type="number"
placeholder="Desconto %">


<input 
id="maximoCupom" 
type="number"
step="0.01"
placeholder="Desconto máximo R$">


<input 
id="minimoCupom" 
type="number"
step="0.01"
placeholder="Compra mínima R$">


<button id="btnAdicionarCupom">
➕ Adicionar Cupom
</button>

</div>


<hr>


<h3>Cupons cadastrados</h3>


<div id="listaCupons">

</div>


</section>





<section id="listas" class="pagina oculto">

<h2>🛒 Lista de Compras</h2>


<div class="formulario">

<select id="produtoLista">
    <option value="">Selecione um produto</option>
</select>


<input 
id="quantidadeLista"
type="number"
value="1"
min="1"
placeholder="Quantidade">


<button id="btnAdicionarLista">
➕ Adicionar à Lista
</button>


</div>


<hr>


<h3>Produtos da compra</h3>


<div id="listaCompras">

</div>


</section>





<section id="simulacao" class="pagina oculto">

<h2>Simulação Inteligente</h2>


<p>
Analise sua lista de compras e encontre o melhor cupom.
</p>


<button id="btnSimular">
🚀 Calcular Melhor Estratégia
</button>


<div id="resultadoSimulacao">

</div>


<div id="resultado">

</div>


</section>


</main>

<script src="js/algoritmo.js"></script>
<script src="js/estrategia.js"></script>
<script src="app.js"></script>



</body>

</html>
